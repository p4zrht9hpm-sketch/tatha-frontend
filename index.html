<!DOCTYPE html>
<html lang="zh-CN" id="html-root">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tatha - AI Career Companion</title>
  <meta name="description" content="Tatha — AI-powered job matching, resume parsing, and career companion." />
  <script src="config.js"></script>
  <style>
    :root {
      --bg: #0f0f12;
      --card: #1a1a20;
      --border: #2a2a35;
      --text: #eaeaf0;
      --muted: #8b8b96;
      --accent: #6366f1;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .topbar { display: flex; justify-content: flex-end; padding: 0.75rem 1.5rem; gap: 0.5rem; }
    .lang-btn { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 0.3rem 0.75rem; color: var(--muted); font-size: 0.8rem; cursor: pointer; }
    .lang-btn.active { border-color: var(--accent); color: var(--accent); }
    .lang-btn:hover { color: var(--text); }
    .hero { text-align: center; padding: 2rem 1rem 2rem; }
    .hero h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 0.5rem; }
    .hero p { color: var(--muted); font-size: 1rem; }
    .pricing { max-width: 960px; margin: 0 auto; padding: 0 1rem 3rem; display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 1rem; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; display: flex; flex-direction: column; }
    .card.popular { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
    .card .tag { font-size: 0.75rem; color: var(--muted); margin-bottom: 0.5rem; }
    .card .price { font-size: 1.5rem; font-weight: 700; color: var(--accent); margin: 0.5rem 0; }
    .card .price span { font-size: 0.875rem; font-weight: 400; color: var(--muted); }
    .card .desc { font-size: 0.875rem; color: var(--muted); margin-bottom: 1rem; flex: 1; }
    .card ul { list-style: none; font-size: 0.8125rem; color: var(--text); margin-bottom: 1rem; }
    .card ul li { position: relative; padding-left: 1rem; margin-bottom: 0.25rem; }
    .card ul li::before { content: "•"; position: absolute; left: 0; color: var(--accent); }
    .card .btn-primary { background: var(--accent); color: #fff; border: none; padding: 0.6rem 1rem; border-radius: 8px; font-size: 0.875rem; cursor: pointer; font-weight: 600; width: 100%; text-align: center; display: inline-block; text-decoration: none; }
    .card .btn-secondary { background: var(--border); color: var(--text); border: none; padding: 0.6rem 1rem; border-radius: 8px; font-size: 0.875rem; cursor: pointer; font-weight: 600; width: 100%; text-align: center; display: inline-block; text-decoration: none; }
    .footer-nav { text-align: center; padding: 1.5rem; }
    .footer-nav a { color: var(--muted); font-size: 0.875rem; margin: 0 0.75rem; text-decoration: none; }
    .footer-nav a:hover { color: var(--accent); }
  </style>
</head>
<body>
  <!-- Language switcher -->
  <div class="topbar">
    <button class="lang-btn" id="btn-zh" onclick="TATHA_CONFIG.setLocale('zh-CN')">中文</button>
    <button class="lang-btn" id="btn-en" onclick="TATHA_CONFIG.setLocale('en')">EN</button>
  </div>

  <div class="hero">
    <h1 id="app-name">Tatha</h1>
    <p id="tagline"></p>
  </div>

  <div class="pricing" id="pricing-cards">
    <!-- Free -->
    <div class="card">
      <div class="tag" id="tag-free"></div>
      <div class="price">
        <span class="currency-symbol">¥</span><span class="price-value" data-region-price="free_monthly">0</span><span id="period"></span>
      </div>
      <div class="desc" id="desc-free"></div>
      <ul id="features-free"></ul>
      <a href="auth.html" class="btn-secondary" id="cta-free"></a>
    </div>
    <!-- Basic -->
    <div class="card popular">
      <div class="tag" id="tag-basic"></div>
      <div class="price">
        <span class="currency-symbol">¥</span><span class="price-value" data-region-price="basic_monthly">99</span><span id="period2"></span>
      </div>
      <div class="desc" id="desc-basic"></div>
      <ul id="features-basic"></ul>
      <a href="auth.html?tier=basic" class="btn-primary" id="cta-basic"></a>
    </div>
    <!-- Pro -->
    <div class="card">
      <div class="tag" id="tag-pro"></div>
      <div class="price">
        <span class="currency-symbol">¥</span><span class="price-value" data-region-price="pro_monthly">299</span><span id="period3"></span>
      </div>
      <div class="desc" id="desc-pro"></div>
      <ul id="features-pro"></ul>
      <a href="auth.html?tier=pro" class="btn-secondary" id="cta-pro"></a>
    </div>
  </div>

  <div class="footer-nav">
    <a href="auth.html" id="nav-login"></a>
    <a href="demo.html" id="nav-demo"></a>
  </div>

  <script>
    (function () {
      var locale = TATHA_CONFIG.getLocale();
      var t = TATHA_CONFIG.t();
      var base = TATHA_CONFIG.BASE_URL;

      // Mark active lang button
      document.getElementById('btn-zh').classList.toggle('active', locale === 'zh-CN');
      document.getElementById('btn-en').classList.toggle('active', locale === 'en');
      document.getElementById('html-root').setAttribute('lang', locale);

      // Apply i18n strings
      document.getElementById('tagline').textContent = t.tagline;
      document.getElementById('nav-login').textContent = t.nav.login;
      document.getElementById('nav-demo').textContent = t.nav.demo;

      ['free', 'basic', 'pro'].forEach(function (tier) {
        var info = t.tiers[tier];
        document.getElementById('tag-' + tier).textContent = info.tag;
        document.getElementById('desc-' + tier).textContent = info.desc;
        document.getElementById('cta-' + tier).textContent = info.cta;
        var ul = document.getElementById('features-' + tier);
        ul.innerHTML = t.features[tier].map(function (f) {
          return '<li>' + f + '</li>';
        }).join('');
      });
      ['period', 'period2', 'period3'].forEach(function (id) {
        document.getElementById(id).textContent = t.period;
      });

      // Fetch region pricing
      fetch(base + '/v1/region')
        .then(function (r) { return r.ok ? r.json() : Promise.reject(r); })
        .then(function (data) {
          var p = data.pricing || {};
          var sym = data.currency === 'USD' ? '$' : '¥';
          document.querySelectorAll('.currency-symbol').forEach(function (el) { el.textContent = sym; });
          document.querySelectorAll('[data-region-price]').forEach(function (el) {
            var key = el.getAttribute('data-region-price');
            var val = p[key];
            if (val !== undefined && val !== null) el.textContent = val;
          });
        })
        .catch(function () {});
    })();
  </script>
</body>
</html>
