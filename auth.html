<!DOCTYPE html>
<html lang="zh-CN" id="html-root">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign In — Tatha</title>
  <script src="config.js"></script>
  <style>
    :root { --bg: #0f0f12; --card: #1a1a20; --text: #e4e4e7; --muted: #71717a; --accent: #a78bfa; --border: #27272a; }
    * { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 2rem 1.5rem; line-height: 1.5; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .topbar { position: fixed; top: 0.75rem; right: 1rem; display: flex; gap: 0.5rem; }
    .lang-btn { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 0.3rem 0.75rem; color: var(--muted); font-size: 0.8rem; cursor: pointer; }
    .lang-btn.active { border-color: var(--accent); color: var(--accent); }
    .auth-box { width: 100%; max-width: 400px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; }
    .auth-box h1 { font-size: 1.25rem; margin: 0 0 1rem; }
    .demo-note { font-size: 0.75rem; color: var(--muted); margin: 0 0 0.75rem; }
    .tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .tabs a { padding: 0.5rem 1rem; border-radius: 6px; text-decoration: none; color: var(--muted); background: transparent; }
    .tabs a.active { background: var(--accent); color: #fff; }
    .tabs a:hover:not(.active) { background: var(--border); color: var(--text); }
    label { display: block; font-size: 0.8125rem; color: var(--muted); margin-bottom: 0.25rem; margin-top: 0.75rem; }
    input[type="email"], input[type="password"], input[type="text"] {
      width: 100%; padding: 0.5rem 0.75rem; background: var(--bg); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text); font-size: 0.875rem;
    }
    .btn { width: 100%; padding: 0.6rem 1rem; margin-top: 1rem; border-radius: 8px; font-size: 0.875rem; font-weight: 500; border: none; cursor: pointer; background: var(--accent); color: #fff; }
    .btn:hover { filter: brightness(1.1); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .panel { display: none; }
    .panel.active { display: block; }
    .msg { font-size: 0.8125rem; margin-top: 0.5rem; }
    .msg.error { color: #f87171; }
    .msg.ok { color: #22c55e; }
    .divider { display: flex; align-items: center; gap: 0.75rem; margin: 1.25rem 0 1rem; }
    .divider span { flex: 1; height: 1px; background: var(--border); }
    .divider p { font-size: 0.75rem; color: var(--muted); white-space: nowrap; }
    .btn-oauth { width: 100%; padding: 0.6rem 1rem; border-radius: 8px; font-size: 0.875rem; font-weight: 500; border: 1px solid var(--border); cursor: pointer; background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
    .btn-oauth:hover { border-color: var(--accent); color: var(--accent); }
    .btn-oauth svg { width: 18px; height: 18px; flex-shrink: 0; }
    .back { margin-top: 1rem; text-align: center; }
    .back a { color: var(--muted); font-size: 0.875rem; }
    .back a:hover { color: var(--accent); }
  </style>
</head>
<body>
  <div class="topbar">
    <button class="lang-btn" id="btn-zh" onclick="TATHA_CONFIG.setLocale('zh-CN')">中文</button>
    <button class="lang-btn" id="btn-en" onclick="TATHA_CONFIG.setLocale('en')">EN</button>
  </div>

  <div class="auth-box">
    <h1 id="auth-title"></h1>
    <p class="demo-note" id="demo-note"></p>

    <div class="tabs">
      <a href="#" id="tab-login" class="active" id="tab-login-text"></a>
      <a href="#" id="tab-register"></a>
    </div>

    <!-- Login Panel -->
    <div id="panel-login" class="panel active">
      <form id="form-login" action="javascript:void(0)" method="post">
        <label id="label-email-login"></label>
        <input type="email" id="login-email" placeholder="your@email.com" required />
        <label id="label-pw-login"></label>
        <input type="password" id="login-password" placeholder="••••••••" required />
        <div id="login-msg" class="msg"></div>
        <button type="submit" class="btn" id="btn-login"></button>
      </form>

      <!-- OAuth section — Phase 2: wire up to Supabase Auth -->
      <div class="divider"><span></span><p id="or-continue"></p><span></span></div>
      <button class="btn-oauth" id="btn-google-login" onclick="tatha_oauthGoogle()">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        <span id="btn-google-text"></span>
      </button>
    </div>

    <!-- Register Panel -->
    <div id="panel-register" class="panel">
      <form id="form-register" action="javascript:void(0)" method="post">
        <label id="label-email-reg"></label>
        <input type="email" id="register-email" placeholder="your@email.com" required />
        <label id="label-pw-reg"></label>
        <input type="password" id="register-password" placeholder="••••••••" required minlength="6" />
        <label id="label-confirm-pw"></label>
        <input type="password" id="register-password2" placeholder="••••••••" required />
        <div id="register-msg" class="msg"></div>
        <button type="submit" class="btn" id="btn-register"></button>
      </form>

      <div class="divider"><span></span><p id="or-continue-reg"></p><span></span></div>
      <button class="btn-oauth" onclick="tatha_oauthGoogle()">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        <span id="btn-google-text-reg"></span>
      </button>
    </div>

    <div class="back">
      <a href="index.html" id="back-index"></a> · <a href="demo.html" id="back-demo"></a>
    </div>
  </div>

  <script>
    (function () {
      var locale = TATHA_CONFIG.getLocale();
      var t = TATHA_CONFIG.t().auth;
      var base = TATHA_CONFIG.BASE_URL;

      // Mark active lang
      document.getElementById('btn-zh').classList.toggle('active', locale === 'zh-CN');
      document.getElementById('btn-en').classList.toggle('active', locale === 'en');
      document.getElementById('html-root').setAttribute('lang', locale);

      // Apply i18n
      document.getElementById('auth-title').textContent = t.title;
      document.getElementById('demo-note').textContent = t.demoNote;
      document.getElementById('tab-login').textContent = t.tabLogin;
      document.getElementById('tab-register').textContent = t.tabRegister;
      document.getElementById('label-email-login').textContent = t.labelEmail;
      document.getElementById('label-pw-login').textContent = t.labelPassword;
      document.getElementById('btn-login').textContent = t.btnLogin;
      document.getElementById('label-email-reg').textContent = t.labelEmail;
      document.getElementById('label-pw-reg').textContent = t.labelPassword;
      document.getElementById('label-confirm-pw').textContent = t.labelConfirmPw;
      document.getElementById('btn-register').textContent = t.btnRegister;
      document.getElementById('or-continue').textContent = t.orContinueWith;
      document.getElementById('or-continue-reg').textContent = t.orContinueWith;
      document.getElementById('btn-google-text').textContent = t.googleLogin;
      document.getElementById('btn-google-text-reg').textContent = t.googleLogin;
      document.getElementById('back-index').textContent = t.backIndex;
      document.getElementById('back-demo').textContent = t.backDemo;

      function showPanel(name) {
        document.querySelectorAll('.panel').forEach(function (p) { p.classList.remove('active'); });
        document.querySelectorAll('.tabs a').forEach(function (a) { a.classList.remove('active'); });
        var panel = document.getElementById('panel-' + name);
        var tab = document.getElementById('tab-' + name);
        if (panel) panel.classList.add('active');
        if (tab) tab.classList.add('active');
      }
      document.getElementById('tab-login').onclick = function (e) { e.preventDefault(); showPanel('login'); };
      document.getElementById('tab-register').onclick = function (e) { e.preventDefault(); showPanel('register'); };

      function setMsg(id, text, isError) {
        var el = document.getElementById(id);
        if (!el) return;
        el.textContent = text || '';
        el.className = 'msg' + (isError ? ' error' : ' ok');
      }

      document.getElementById('form-login').onsubmit = function (e) {
        e.preventDefault();
        var email = document.getElementById('login-email').value.trim();
        var password = document.getElementById('login-password').value;
        var btn = document.getElementById('btn-login');
        setMsg('login-msg', '');
        btn.disabled = true;
        fetch(base + '/v1/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: email, password: password })
        })
          .then(function (r) { return r.json(); })
          .then(function (data) {
            if (data.ok) {
              setMsg('login-msg', t.loginSuccess, false);
              if (data.token) localStorage.setItem('tatha_demo_token', data.token);
              setTimeout(function () { window.location.href = 'demo.html'; }, 800);
            } else {
              setMsg('login-msg', data.error || data.message || t.btnLogin + ' failed', true);
              btn.disabled = false;
            }
          })
          .catch(function (err) {
            setMsg('login-msg', t.errRequest + (err.message || 'API offline'), true);
            btn.disabled = false;
          });
      };

      document.getElementById('form-register').onsubmit = function (e) {
        e.preventDefault();
        var email = document.getElementById('register-email').value.trim();
        var password = document.getElementById('register-password').value;
        var password2 = document.getElementById('register-password2').value;
        var btn = document.getElementById('btn-register');
        setMsg('register-msg', '');
        if (password !== password2) { setMsg('register-msg', t.pwMismatch, true); return; }
        btn.disabled = true;
        fetch(base + '/v1/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: email, password: password })
        })
          .then(function (r) { return r.json(); })
          .then(function (data) {
            if (data.ok) {
              setMsg('register-msg', t.registerSuccess, false);
              if (data.token) localStorage.setItem('tatha_demo_token', data.token);
              setTimeout(function () { window.location.href = 'demo.html'; }, 800);
            } else {
              setMsg('register-msg', data.error || data.message || t.btnRegister + ' failed', true);
              btn.disabled = false;
            }
          })
          .catch(function (err) {
            setMsg('register-msg', t.errRequest + (err.message || 'API offline'), true);
            btn.disabled = false;
          });
      };

      if (window.location.hash === '#register') showPanel('register');
    })();

    /**
     * Google OAuth via Supabase Auth — Phase 2 implementation stub
     * Replace SUPABASE_URL and SUPABASE_ANON_KEY with real values when ready.
     * Reference: https://supabase.com/docs/guides/auth/social-login/auth-google
     */
    function tatha_oauthGoogle() {
      // TODO Phase 2: uncomment and configure Supabase
      // var SUPABASE_URL = 'https://your-project.supabase.co';
      // var SUPABASE_ANON_KEY = 'your-anon-key';
      // var client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      // client.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.origin + '/demo.html' } });

      alert('Google OAuth coming soon (Phase 2 — Supabase Auth integration).\nFor now please use email/password demo login.');
    }
  </script>
</body>
</html>
